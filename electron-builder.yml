appId: vn.gence.desktop
productName: Gence
copyright: Copyright © 2026 Gence

directories:
  output: release
  buildResources: build

# Mo ta hien o thuoc tinh file .exe + trang cai dat.
extraMetadata:
  description: Hệ thống quản lý Gence

files:
  - dist/**/*
  - "!**/*.map"
  # Icon runtime (cua so + tray). buildResources KHONG tu copy vao app -> phai khai bao o day.
  - build/icon.png
  - build/trayTemplate.png
  - build/trayTemplate@2x.png
  - build/tray-white-16.png
  - build/tray-white-32.png
  - build/tray.png

# ---------- Windows (NSIS installer + auto-update) ----------
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico # multi-size 16-256, dung truc tiep (khong auto-gen tu png)
  # Chua co code cert -> build unsigned (auto-update van chay, chi canh bao SmartScreen).

nsis:
  oneClick: true                       # cai 1-click: double-click la xong, khong hoi trang nao
  perMachine: false                    # cai cho user hien tai -> khong can admin, khong hoi "all users/just me"
  createDesktopShortcut: true          # tu tao shortcut ngoai desktop
  createStartMenuShortcut: true
  runAfterFinish: true                 # cai xong -> mo app luon
  shortcutName: Gence                  # ten duoi icon desktop = "Gence"
  uninstallDisplayName: Gence          # ten trong Apps & features / Go cai dat

# ---------- macOS (dmg + zip, ky + notarize) ----------
mac:
  category: public.app-category.business
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarize qua env APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID (CI secrets).
  notarize: true

dmg:
  title: Gence Desktop

# ---------- Auto-update publish (GitHub Releases) ----------
publish:
  provider: github
  owner: kid182
  repo: gence-desktop
  releaseType: release
